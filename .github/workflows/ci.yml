name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy a specific app or all apps
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - account-engine
          - alpha-etl
          - analytics-engine

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install uv (for Python)
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Python security audit (analytics-engine)
        working-directory: apps/analytics-engine
        run: make deps-audit

      - name: Run check-variant tasks
        run: pnpm run check:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Node security audit
        run: pnpm run security:audit

  deploy-gates:
    runs-on: ubuntu-latest
    outputs:
      fly_matrix: ${{ steps.resolve.outputs.fly_matrix }}
      fly_verify_matrix: ${{ steps.resolve.outputs.fly_verify_matrix }}
      frontend: ${{ steps.resolve.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'
            account-engine:
              - 'apps/account-engine/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            alpha-etl:
              - 'apps/alpha-etl/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            analytics-engine:
              - 'apps/analytics-engine/**'
              - '.dockerignore'

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          PATHS_CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          set -euo pipefail

          # Single source of truth: adding a new Fly.io app requires only
          # appending to this registry + adding a paths-filter block above
          # (and a workflow_dispatch option for manual dispatch UX).
          registry='[
            {"app":"account-engine","secret_name":"FLY_API_TOKEN_ACCOUNT","fly_config":"apps/account-engine/fly.toml","verify_package_script":"verify:account-engine-package","capture_release_metadata":true,"verify_docker":true},
            {"app":"alpha-etl","secret_name":"FLY_API_TOKEN_ETL","fly_config":"apps/alpha-etl/fly.toml","verify_package_script":"","capture_release_metadata":false,"verify_docker":true},
            {"app":"analytics-engine","secret_name":"FLY_API_TOKEN_ANALYTICS","fly_config":"apps/analytics-engine/fly.toml","verify_package_script":"","capture_release_metadata":false,"verify_docker":false}
          ]'

          # Compute the set of changed apps (JSON array of strings).
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$DEPLOY_TARGET" = "all" ]; then
              changes=$(jq -cn --argjson r "$registry" '[$r[].app] + ["frontend"]')
            else
              changes=$(jq -cn --arg t "$DEPLOY_TARGET" '[$t]')
            fi
          else
            # paths-filter emits outputs.changes as JSON like ["frontend","alpha-etl"].
            # When the step is skipped (workflow_dispatch branch) PATHS_CHANGES is empty.
            changes="${PATHS_CHANGES:-[]}"
          fi

          fly_matrix=$(jq -c \
            --argjson registry "$registry" \
            --argjson changes "$changes" \
            -n '[$registry[] | select(.app as $a | $changes | index($a))]')

          fly_verify_matrix=$(jq -c \
            --argjson matrix "$fly_matrix" \
            -n '[$matrix[] | select(.verify_docker)]')

          frontend=$(jq -rn --argjson c "$changes" '($c | index("frontend")) != null')

          {
            echo "fly_matrix=$fly_matrix"
            echo "fly_verify_matrix=$fly_verify_matrix"
            echo "frontend=$frontend"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved fly_matrix=$fly_matrix"
          echo "Resolved fly_verify_matrix=$fly_verify_matrix"
          echo "Resolved frontend=$frontend"

  verify-fly-docker:
    needs: [deploy-gates]
    if: github.event_name == 'pull_request' && needs.deploy-gates.outputs.fly_verify_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.deploy-gates.outputs.fly_verify_matrix) }}
    uses: ./.github/workflows/verify-docker.yml
    with:
      app: ${{ matrix.app }}

  deploy-fly:
    needs: [lint-test, deploy-gates]
    if: github.event_name != 'pull_request' && needs.deploy-gates.outputs.fly_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.deploy-gates.outputs.fly_matrix) }}
    uses: ./.github/workflows/deploy-fly.yml
    with:
      app: ${{ matrix.app }}
      fly_config: ${{ matrix.fly_config }}
      verify_package_script: ${{ matrix.verify_package_script }}
      capture_release_metadata: ${{ matrix.capture_release_metadata }}
    secrets:
      fly_token: ${{ secrets[matrix.secret_name] }}

  check-dead-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dead env vars
        run: bash scripts/check-dead-env.sh
