name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      account-engine: ${{ steps.filter.outputs.account-engine }}
      alpha-etl: ${{ steps.filter.outputs.alpha-etl }}
      analytics-engine: ${{ steps.filter.outputs.analytics-engine }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
            account-engine:
              - 'apps/account-engine/**'
              - 'packages/**'
            alpha-etl:
              - 'apps/alpha-etl/**'
              - 'packages/**'
            analytics-engine:
              - 'apps/analytics-engine/**'

  lint-test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install uv (for Python)
        if: needs.changes.outputs.analytics-engine == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"

      - run: pnpm install --frozen-lockfile

      - name: Build affected packages
        run: pnpm turbo run build --affected

      - name: Run affected lint
        run: pnpm turbo run lint --affected

      - name: Run affected type-check
        run: pnpm turbo run type-check --affected

      - name: Run affected format check
        run: pnpm turbo run format:check --affected

      - name: Run affected deadcode check
        run: pnpm turbo run deadcode --affected

      - name: Run affected dup check
        run: pnpm turbo run dup:check --affected

      - name: Node security audit
        run: pnpm audit --audit-level=moderate

      - name: Run affected tests
        run: pnpm turbo run test --affected
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-frontend:
    needs: [changes, lint-test]
    if: needs.changes.outputs.frontend == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy frontend to Cloudflare Pages"
      # Add your Cloudflare Pages deployment steps here

  deploy-account-engine:
    needs: [changes, lint-test]
    if: needs.changes.outputs.account-engine == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config apps/account-engine/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ACCOUNT }}

  deploy-alpha-etl:
    needs: [changes, lint-test]
    if: needs.changes.outputs.alpha-etl == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config apps/alpha-etl/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ETL }}

  deploy-analytics-engine:
    needs: [changes, lint-test]
    if: needs.changes.outputs.analytics-engine == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config apps/analytics-engine/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ANALYTICS }}
