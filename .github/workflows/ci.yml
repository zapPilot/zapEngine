name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy a specific app or all apps
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - account-engine
          - alpha-etl
          - analytics-engine

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install uv (for Python)
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Run check-variant tasks
        run: pnpm turbo run format:check lint type-check deadcode dup:check sql:audit service-reachability pylint:duplicate-check test:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Node security audit
        run: pnpm audit --audit-level=moderate

  deploy-gates:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.resolve.outputs.frontend }}
      account_engine: ${{ steps.resolve.outputs.account_engine }}
      alpha_etl: ${{ steps.resolve.outputs.alpha_etl }}
      analytics_engine: ${{ steps.resolve.outputs.analytics_engine }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'
            account-engine:
              - 'apps/account-engine/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            alpha-etl:
              - 'apps/alpha-etl/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            analytics-engine:
              - 'apps/analytics-engine/**'
              - '.dockerignore'

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          FILTER_FRONTEND: ${{ steps.filter.outputs.frontend }}
          FILTER_ACCOUNT_ENGINE: ${{ steps.filter.outputs.account-engine }}
          FILTER_ALPHA_ETL: ${{ steps.filter.outputs.alpha-etl }}
          FILTER_ANALYTICS_ENGINE: ${{ steps.filter.outputs.analytics-engine }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$DEPLOY_TARGET" in
              all)
                frontend=true
                account_engine=true
                alpha_etl=true
                analytics_engine=true
                ;;
              frontend)
                frontend=true
                account_engine=false
                alpha_etl=false
                analytics_engine=false
                ;;
              account-engine)
                frontend=false
                account_engine=true
                alpha_etl=false
                analytics_engine=false
                ;;
              alpha-etl)
                frontend=false
                account_engine=false
                alpha_etl=true
                analytics_engine=false
                ;;
              analytics-engine)
                frontend=false
                account_engine=false
                alpha_etl=false
                analytics_engine=true
                ;;
              *)
                echo "Unsupported deploy target: $DEPLOY_TARGET" >&2
                exit 1
                ;;
            esac
          else
            frontend="$FILTER_FRONTEND"
            account_engine="$FILTER_ACCOUNT_ENGINE"
            alpha_etl="$FILTER_ALPHA_ETL"
            analytics_engine="$FILTER_ANALYTICS_ENGINE"
          fi

          {
            echo "frontend=$frontend"
            echo "account_engine=$account_engine"
            echo "alpha_etl=$alpha_etl"
            echo "analytics_engine=$analytics_engine"
          } >> "$GITHUB_OUTPUT"

  deploy-account-engine:
    needs: [lint-test, deploy-gates]
    if: github.event_name != 'pull_request' && needs.deploy-gates.outputs.account_engine == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-account-engine-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy account-engine to Fly.io
        run: flyctl deploy . --remote-only --config apps/account-engine/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ACCOUNT }}

  deploy-alpha-etl:
    needs: [lint-test, deploy-gates]
    if: github.event_name != 'pull_request' && needs.deploy-gates.outputs.alpha_etl == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-alpha-etl-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy alpha-etl to Fly.io
        run: flyctl deploy . --remote-only --config apps/alpha-etl/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ETL }}

  deploy-analytics-engine:
    needs: [lint-test, deploy-gates]
    if: github.event_name != 'pull_request' && needs.deploy-gates.outputs.analytics_engine == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-analytics-engine-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy analytics-engine to Fly.io
        run: flyctl deploy . --remote-only --config apps/analytics-engine/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ANALYTICS }}

  check-dead-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dead env vars
        run: bash scripts/check-dead-env.sh
