name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy a specific app or all apps
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - account-engine
          - alpha-etl
          - analytics-engine

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "pnpm"

      - name: Install uv (for Python)
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Run check-variant tasks
        run: pnpm run check:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Security audit (Node + Python)
        run: pnpm run security:audit

  deploy-gates:
    runs-on: ubuntu-latest
    outputs:
      fly_matrix: ${{ steps.resolve.outputs.fly_matrix }}
      fly_verify_matrix: ${{ steps.resolve.outputs.fly_verify_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert dispatch options match .github/fly-apps.json
        run: bash scripts/check-dispatch-registry-drift.sh

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'
            account-engine:
              - 'apps/account-engine/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            alpha-etl:
              - 'apps/alpha-etl/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.dockerignore'
              - '.nvmrc'
            analytics-engine:
              - 'apps/analytics-engine/**'
              - '.dockerignore'

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          PATHS_CHANGES: ${{ steps.filter.outputs.changes }}
        run: bash scripts/resolve-deploy-matrix.sh

  verify-fly-docker:
    needs: [deploy-gates]
    if: github.event_name == 'pull_request' && needs.deploy-gates.outputs.fly_verify_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.deploy-gates.outputs.fly_verify_matrix) }}
    uses: ./.github/workflows/verify-docker.yml
    with:
      app: ${{ matrix.app }}

  deploy-fly:
    needs: [lint-test, deploy-gates]
    if: github.event_name != 'pull_request' && needs.deploy-gates.outputs.fly_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.deploy-gates.outputs.fly_matrix) }}
    uses: ./.github/workflows/deploy-fly.yml
    with:
      app: ${{ matrix.app }}
      fly_config: ${{ matrix.fly_config }}
      verify_package_script: ${{ matrix.verify_package_script }}
      capture_release_metadata: ${{ matrix.capture_release_metadata }}
    secrets:
      fly_token: ${{ secrets[matrix.secret_name] }}

  check-dead-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dead env vars
        run: bash scripts/check-dead-env.sh
