name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      analytics-engine: ${{ steps.filter.outputs.analytics-engine }}
      changed_apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters:
            frontend:
              - "apps/frontend/**"
              - &watch_packages "packages/**"
            account-engine:
              - "apps/account-engine/**"
              - *watch_packages
            alpha-etl:
              - "apps/alpha-etl/**"
              - *watch_packages
            analytics-engine:
              - "apps/analytics-engine/**"

  lint-test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install uv (for Python)
        if: needs.changes.outputs.analytics-engine == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.13"

      - run: pnpm install --frozen-lockfile

      - name: Build affected packages
        run: pnpm turbo run build --affected

      - name: Run affected lint
        run: pnpm turbo run lint --affected

      - name: Run affected type-check
        run: pnpm turbo run type-check --affected

      - name: Run affected format check
        run: pnpm turbo run format:check --affected

      - name: Run affected deadcode check
        run: pnpm turbo run deadcode --affected

      - name: Run affected dup check
        run: pnpm turbo run dup:check --affected

      - name: Node security audit
        run: pnpm audit --audit-level=moderate

      - name: Run affected tests
        run: pnpm turbo run test --affected
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy:
    needs: [changes, lint-test]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.changed_apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            platform: cloudflare
          - app: account-engine
            platform: fly
            fly_config: apps/account-engine/fly.toml
            fly_token_secret: FLY_API_TOKEN_ACCOUNT
          - app: alpha-etl
            platform: fly
            fly_config: apps/alpha-etl/fly.toml
            fly_token_secret: FLY_API_TOKEN_ETL
          - app: analytics-engine
            platform: fly
            fly_config: apps/analytics-engine/fly.toml
            fly_token_secret: FLY_API_TOKEN_ANALYTICS
    steps:
      - name: Check if this app changed
        id: check
        run: |
          echo "deploy=${{ contains(fromJSON(needs.changes.outputs.changed_apps), matrix.app) }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.check.outputs.deploy == 'true'

      - name: Setup flyctl
        if: steps.check.outputs.deploy == 'true' && matrix.platform == 'fly'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: steps.check.outputs.deploy == 'true' && matrix.platform == 'fly'
        run: flyctl deploy --remote-only --config ${{ matrix.fly_config }}
        env:
          FLY_API_TOKEN: ${{ secrets[matrix.fly_token_secret] }}

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.deploy == 'true' && matrix.platform == 'cloudflare'
        run: echo "Deploy frontend to Cloudflare Pages"
        # Add your Cloudflare Pages deployment steps here
