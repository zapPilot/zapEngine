name: Deploy pitch deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - apps/pitch-deck/**
      - .github/workflows/deploy-pitch-deck.yml
      - package.json
      - pnpm-workspace.yaml
      - turbo.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pitch-deck-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Build pitch deck
        run: pnpm --filter @zapengine/pitch-deck build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pitch deck artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/pitch-deck/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
