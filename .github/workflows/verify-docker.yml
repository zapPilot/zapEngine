name: Verify Docker Build

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
        description: App directory name (e.g., account-engine). Dockerfile must exist at apps/<app>/Dockerfile.

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile
        env:
          APP: ${{ inputs.app }}
        run: docker build --file "apps/${APP}/Dockerfile" --target build .
