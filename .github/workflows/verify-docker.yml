name: Verify Docker Build

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
        description: App directory name (e.g., account-engine). Dockerfile must exist at apps/<app>/Dockerfile.

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile
        env:
          APP: ${{ inputs.app }}
        run: |
          if [ "$APP" = "account-engine" ]; then
            docker build --file "apps/${APP}/Dockerfile" --tag "${APP}:verify" .
            docker run --rm -e NODE_ENV=test "${APP}:verify"
          else
            docker build --file "apps/${APP}/Dockerfile" --target build .
          fi
