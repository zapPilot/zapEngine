#!/usr/bin/env -S PRE_COMMIT_HOME=/tmp/pre-commit-cache pre-commit run --all-files -c
repos:
  # Auto-fixing and validation hooks
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run ruff format .'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff-check-fix
        name: ruff-check-fix
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run ruff check --fix . && uv run python scripts/audit_sql_params.py'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff-check-validate
        name: ruff-check-validate
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run ruff check .'
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy-validate
        name: mypy-validate
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run mypy src/'
        language: system
        types: [python]
        pass_filenames: false
      - id: vulture-validate
        name: vulture-validate
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run vulture src/ vulture_whitelist.py --min-confidence 60'
        language: system
        types: [python]
        pass_filenames: false
      - id: duplicate-code-check
        name: duplicate-code-check
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run python check_duplicates.py'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: service-reachability-check
        name: service-reachability-check
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run python scripts/check_service_reachability.py'
        language: system
        types: [python]
        pass_filenames: false
      - id: pylint-duplicate-check
        name: pylint-duplicate-check
        entry: bash -c 'cd apps/analytics-engine && UV_CACHE_DIR=/tmp/uv-cache uv run pylint --jobs=1 --rcfile=pyproject.toml src/'
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest-validate
        name: pytest-validate
        entry: bash -c 'cd apps/analytics-engine && bash scripts/run-tests-precommit.sh'
        language: system
        types: [python]
        pass_filenames: false
        verbose: true

  # File fixing hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
