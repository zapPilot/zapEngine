name: ai_podcast_mobile
description: Minimal Flutter app for the AI Podcast POC.
publish_to: 'none'

version: 2.0.4+204

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  app_links: ^7.2.0
  http: ^1.2.2
  just_audio: ^0.10.5
  audio_service: ^0.18.15
  audio_session: ^0.2.3
  provider: ^6.1.2
  share_plus: ^13.2.0
  shared_preferences: ^2.2.0
  supabase_flutter: ^2.5.0
  zapengine_tokens:
    path: ../../packages/design-tokens

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Geist Sans
      fonts:
        - asset: assets/fonts/geist/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/geist/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/geist/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/geist/Geist-Bold.ttf
          weight: 700
        - asset: assets/fonts/geist/Geist-ExtraBold.ttf
          weight: 800
    - family: Instrument Serif
      fonts:
        - asset: assets/fonts/instrument-serif/InstrumentSerif-Regular.ttf
          weight: 400
        - asset: assets/fonts/instrument-serif/InstrumentSerif-Italic.ttf
          weight: 400
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/jetbrains-mono/JetBrainsMono-Bold.ttf
          weight: 700
