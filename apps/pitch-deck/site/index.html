<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zap Pilot Pitch Deck</title>
    <meta
      name="description"
      content="Zap Pilot pitch deck: a non-custodial portfolio autopilot for regime-aware allocation."
    />
    <link rel="icon" href="data:," />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css"
      id="theme"
    />
    <style>
      :root {
        --zp-bg: #07090d;
        --zp-bg-soft: #10151d;
        --zp-ink: #f6f7f9;
        --zp-muted: #9aa5b1;
        --zp-line: rgba(255, 255, 255, 0.14);
        --zp-violet: #8b5cf6;
        --zp-blue: #3b82f6;
        --zp-amber: #f59e0b;
        --zp-green: #22c55e;
        --zp-red: #ef4444;
      }

      body {
        background:
          radial-gradient(circle at 16% 18%, rgba(139, 92, 246, 0.24), transparent 24rem),
          radial-gradient(circle at 84% 22%, rgba(59, 130, 246, 0.18), transparent 26rem),
          linear-gradient(135deg, var(--zp-bg), #0b1017 58%, #050608);
      }

      .reveal {
        color: var(--zp-ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .reveal .slides {
        text-align: left;
      }

      .reveal h1,
      .reveal h2,
      .reveal h3 {
        color: var(--zp-ink);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.02;
        text-transform: none;
      }

      .reveal h1 {
        max-width: 980px;
        font-size: clamp(3rem, 7vw, 6.8rem);
      }

      .reveal h2 {
        max-width: 960px;
        font-size: clamp(2.4rem, 5vw, 5rem);
      }

      .reveal p,
      .reveal li {
        color: var(--zp-muted);
        font-size: clamp(1.2rem, 2vw, 1.85rem);
        line-height: 1.42;
      }

      .reveal strong {
        color: var(--zp-ink);
        font-weight: 720;
      }

      .reveal em {
        color: #c8d2df;
        font-style: normal;
      }

      .reveal a {
        color: #9cc2ff;
      }

      .reveal ul {
        display: grid;
        gap: 0.55rem;
        margin-left: 1.2em;
      }

      .reveal blockquote {
        width: auto;
        margin: 1.8rem 0 0;
        padding: 1.3rem 1.5rem;
        border: 1px solid var(--zp-line);
        border-left: 0.35rem solid var(--zp-amber);
        background: rgba(16, 21, 29, 0.72);
        box-shadow: none;
        color: var(--zp-ink);
      }

      .reveal blockquote p {
        color: var(--zp-ink);
      }

      .reveal table {
        width: 100%;
        margin-top: 1.5rem;
        border-collapse: collapse;
        font-size: 1.05rem;
      }

      .reveal th,
      .reveal td {
        padding: 0.72rem 0.8rem;
        border-bottom: 1px solid var(--zp-line);
        color: var(--zp-muted);
      }

      .reveal th {
        color: var(--zp-ink);
        font-weight: 700;
      }

      .reveal .progress {
        color: var(--zp-amber);
      }

      .reveal .controls {
        color: var(--zp-ink);
      }

      .reveal section {
        padding: 1.8rem 0;
      }

      .reveal section.title-slide h1 {
        margin-bottom: 1.2rem;
      }

      .reveal section.title-slide p {
        max-width: 740px;
      }

      .reveal .pillars {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 2rem;
      }

      .reveal .pillar {
        min-height: 9rem;
        padding: 1rem;
        border: 1px solid var(--zp-line);
        background: rgba(16, 21, 29, 0.76);
      }

      .reveal .pillar strong {
        display: block;
        margin-bottom: 0.4rem;
      }

      .reveal .metric-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 2rem;
      }

      .reveal .metric {
        padding: 1rem;
        border-top: 3px solid var(--zp-blue);
        background: rgba(16, 21, 29, 0.78);
      }

      .reveal .metric strong {
        display: block;
        font-size: 2.4rem;
        line-height: 1;
      }

      .reveal .muted {
        color: var(--zp-muted);
        font-size: 1rem;
      }

      @media (max-width: 720px) {
        .reveal .slides {
          text-align: left;
        }

        .reveal .pillars,
        .reveal .metric-grid {
          grid-template-columns: 1fr;
        }

        .reveal p,
        .reveal li {
          font-size: 1.05rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="reveal" aria-label="Zap Pilot pitch deck">
      <div class="slides">
        <section
          data-markdown="slides/deck.md"
          data-separator="^\n---\n$"
          data-separator-vertical="^\n--\n$"
          data-charset="utf-8"
        ></section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        center: true,
        slideNumber: "c/t",
        transition: "fade",
        plugins: [RevealMarkdown],
      });
    </script>
  </body>
</html>
