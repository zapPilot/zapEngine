<!doctype html>
<html lang="en">
  <head>
    <title>Power Markets in Transition</title>
    <meta
      property="og:image"
      content="https://cdn.example.test/social-grid.jpg#preview"
    />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="A regional power grid at dusk" />
  </head>
  <body>
    <header>
      <img src="/site-logo.svg" alt="Publisher logo" />
    </header>
    <article>
      <h1>Power Markets in Transition</h1>
      <p>
        Regional power markets are adding storage and transmission while demand
        patterns change.
      </p>
      <img
        src="/pixel.gif"
        data-src="/images/control-room.jpg"
        data-width="1600"
        data-height="900"
        alt="Operators in a control room"
      />
      <img
        src="/images/chart-fallback.jpg"
        srcset="
          /images/chart-small.jpg   480w,
          /images/chart-medium.jpg  960w,
          /images/chart-large.jpg  1920w
        "
        height="1080"
        alt="Electricity demand chart"
      />
      <figure>
        <img
          src="/images/turbine-placeholder.jpg"
          data-lazy-srcset="
            /images/turbine-low.jpg 1x,
            /images/turbine-high.jpg 2x
          "
          width="1200"
          height="800"
        />
        <figcaption>Wind turbines near a transmission corridor</figcaption>
      </figure>
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP" />
      <p>
        The investment cycle spans generation, networks, and flexible demand.
      </p>
    </article>
    <figure>
      <img
        data-src="//media.example.test/standalone-figure.webp"
        width="1280"
        height="720"
        alt="A standalone grid map"
      />
    </figure>
    <aside>
      <img src="/advertisement.jpg" alt="Advertisement" />
    </aside>
  </body>
</html>
